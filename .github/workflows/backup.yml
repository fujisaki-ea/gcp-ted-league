name: Firebase DB Backup

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 日本時間 深夜0時
  workflow_dispatch:       # 手動実行も可能

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: backups
          fetch-depth: 0

      - name: Export Firebase DB
        run: |
          mkdir -p backups
          DATE=$(TZ='Asia/Tokyo' date '+%Y-%m-%d')
          # スコア・チームデータ
          LEAGUE=$(curl -s "https://gcp-league-677e9-default-rtdb.asia-southeast1.firebasedatabase.app/gcpLeague.json")
          # パスワード（ハッシュ）
          PASSWORDS=$(curl -s "https://gcp-league-677e9-default-rtdb.asia-southeast1.firebasedatabase.app/passwords.json")
          echo "{\"gcpLeague\":${LEAGUE},\"passwords\":${PASSWORDS}}" > "backups/${DATE}.json"
          echo "Backed up: backups/${DATE}.json"

      - name: Delete old backups (keep last 30 days)
        run: |
          cd backups
          ls -1 *.json 2>/dev/null | sort | head -n -30 | xargs -r rm --
          echo "Old backups cleaned up"

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(TZ='Asia/Tokyo' date '+%Y-%m-%d')"
          git push
